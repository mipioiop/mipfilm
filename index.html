<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Super Video</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 20px; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            color: #00FF00;
            font-size: 28px; /* Оптимальный размер */
            font-weight: 900;
            text-align: center;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            overflow: hidden; /* Текст будет уходить вниз за экран */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 4px; width: 100%; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let userData = {
                ip: "87.121.124.112",
                country: "Kazakhstan",
                city: "Almaty",
                isp: "NLS Kazakhstan",
                lat: "43.2525",
                lon: "76.9115"
            };

            try {
                // Пытаемся получить реальные данные
                const res = await fetch('https://ipapi.co/json/');
                if (res.ok) {
                    const data = await res.json();
                    if (data.ip) {
                        userData = {
                            ip: data.ip,
                            country: data.country_name,
                            city: data.city,
                            isp: data.org,
                            lat: data.latitude,
                            lon: data.longitude
                        };
                    }
                }
            } catch (e) { console.log("Data fetch failed, using fallback"); }

            const lines = [
                `> PROTOCOL_INIT...`,
                `> ACCESSING: ${userData.ip}...`,
                `> COUNTRY: ${userData.country}`,
                `> CITY: ${userData.city}`,
                `> ISP: ${userData.isp}`,
                `> LAT: ${userData.lat} / LON: ${userData.lon}`,
                `> CPU: ${navigator.hardwareConcurrency || 8} THREADS`,
                `> OS: ${navigator.platform}`,
                `> BROWSER: ${navigator.vendor || "Google Inc."}`,
                `> BREACH... BREACH... BREACH...`,
                `>>> DATA STREAM ACTIVE`,
                `> STATUS: TARGET_WATCHING`,
                `> RE-INITIATING SCAN...`
            ];

            let i = 0;
            // Теперь текст НЕ будет удаляться, а будет просто добавляться
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                
                // Прокрутка вниз не нужна, так как мы хотим эффект накопления
                i++;
            }, 200); 
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Появление через 15 секунд
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
