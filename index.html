<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>МУЛЬТИК</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 20px; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            color: #00FF00;
            font-size: clamp(22px, 5vw, 42px);
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 6px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; width: 100%; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script src="https://get.geojs.io/v1/ip/geo.js"></script>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        // Эта функция сработает автоматически, когда geojs подгрузит инфу
        function geoip(json) {
            const lines = [
                `> IP Address: ${json.ip}`,
                `> Country: ${json.country}`,
                `> City: ${json.city}`,
                `> Region: ${json.region}`,
                `> Latitude: ${json.latitude}`,
                `> Longitude: ${json.longitude}`,
                `> OS: ${navigator.platform}`,
                `> Threads: ${navigator.hardwareConcurrency || 8}`,
                `>>> DATA_STREAM_STABLE`,
                `> SYSTEM_EXPOSED...`,
                `> TARGET_LOCKED!`
            ];

            let i = 0;
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                i++;
                
                if (overlay.childNodes.length > 35) {
                    overlay.removeChild(overlay.firstChild);
                }
            }, 180);
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Ждем 15 секунд и начинаем "водопад"
            setTimeout(() => {
                // Если geojs вдруг не загрузился, используем системную инфу
                if (typeof geoip === 'function' && window.geoip_data) {
                    geoip(window.geoip_data);
                } else {
                    // Запуск через fetch если скрипт выше не сработал
                    fetch('https://get.geojs.io/v1/ip/geo.json')
                        .then(res => res.json())
                        .then(data => geoip(data));
                }
            }, 15000);
        }, { once: true });
    </script>
</body>
</html>
