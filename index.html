<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 20px; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            color: #00FF00;
            font-size: 35px; /* Большой размер */
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 6px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; width: 100%; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let lines = [];
            
            try {
                // Тянем данные через сервис, который использует оригинал
                const res = await fetch('http://ip-api.com/json/?fields=66842623');
                const data = await res.json();
                
                lines = [
                    `> IP Address: ${data.query}`,
                    `> Country: ${data.country}`,
                    `> Region: ${data.regionName}`,
                    `> City: ${data.city}`,
                    `> ZIP Code: ${data.zip}`,
                    `> ISP: ${data.isp}`,
                    `> Organization: ${data.org}`,
                    `> Latitude: ${data.lat}`,
                    `> Longitude: ${data.lon}`,
                    `> Platform: ${navigator.platform}`,
                    `> Browser: ${navigator.vendor}`,
                    `> Cores: ${navigator.hardwareConcurrency || '8'} Threads`,
                    `>>> SYSTEM_BREACH_SUCCESSFUL`,
                    `> TARGET_LOCATED...`
                ];
            } catch (e) {
                // Если сработал блокировщик рекламы или ошибка
                lines = ["> Error: API_BLOCK", "> Retrying breach...", "> IP: Hidden by Proxy"];
            }

            let i = 0;
            // Текст не удаляется, а наслаивается
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                i++;
                
                // Чтобы не тормозило через час, оставим лимит в 100 строк
                if (overlay.childNodes.length > 100) {
                    overlay.removeChild(overlay.firstChild);
                }
            }, 150); 
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Ждем 15 секунд
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
