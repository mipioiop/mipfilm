<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
   <style>
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; background-color: black;
        font-family: 'Courier New', Courier, monospace; /* Хакерский шрифт */
    }
    video {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        min-width: 100%; min-height: 100%;
    }
    #info {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        color: lime; /* Зеленый цвет */
        font-size: 16px;
        font-weight: bold;
        line-height: 1.2;
        text-shadow: 0 0 5px lime; /* Свечение текста */
        z-index: 10;
        overflow-y: scroll; /* Прокрутка */
        padding: 20px;
        box-sizing: border-box;
        display: none; /* Скрыт изначально */
    }
    /* Скрываем скроллбар */
    #info::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

    <div id="info"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

   <script>
    const infoDiv = document.getElementById('info');
    const video = document.getElementById('jam-video');
    let textArray = []; // Массив строк для водопада
    let lineIndex = 0;

    // Функция для бесконечного добавления строк
    function startWaterfall() {
        if (textArray.length === 0) return;

        // Показываем контейнер с текстом
        infoDiv.style.display = 'block';

        const waterfallInterval = setInterval(() => {
            // Если дошли до конца списка, начинаем заново
            if (lineIndex >= textArray.length) {
                lineIndex = 0; 
            }

            // Добавляем новую строку
            const newLine = document.createElement('div');
            newLine.innerText = textArray[lineIndex];
            infoDiv.appendChild(newLine);

            // Скроллим вниз автоматически
            infoDiv.scrollTop = infoDiv.scrollHeight;

            lineIndex++;
        }, 50); // Скорость водопада (50 мс между строками)
    }

    // Загрузка IP-данных
    function loadIP() {
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                // Заполняем массив данных
                textArray = [
                    `>>> INITIALIZING SYSTEM SCAN...`,
                    `>>> PROTOCOL BREAKDETECTED...`,
                    `>>> TARGET_IP: ${data.ip}`,
                    `>>> LOCATION: ${data.city}, ${data.region}, ${data.country_name}`,
                    `>>> LATITUDE: ${data.latitude}`,
                    `>>> LONGITUDE: ${data.longitude}`,
                    `>>> ISP: ${data.org}`,
                    `>>> ASN: ${data.asn}`,
                    `>>> DATETIME: ${new Date().toLocaleString()}`,
                    `>>> BROWSER: ${navigator.userAgent}`,
                    `>>> PLATFORM: ${navigator.platform}`,
                    `>>> SCREEN: ${window.screen.width}x${window.screen.height}`,
                    `--- DATA FLOW END ---`,
                    ``, // Пустая строка для разрыва
                ];
            });
    }

    // Клик для запуска
    document.body.addEventListener('click', function() {
        video.play();
        loadIP(); // Загружаем данные в фоне

        // Запускаем бесконечный водопад через 15 секунд (15000 мс)
        setTimeout(() => {
            startWaterfall();
        }, 15000); 
    }, { once: true });
    </script>
</body>
</html>
