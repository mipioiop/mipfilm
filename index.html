<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Courier New', Courier, monospace;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
        }
        #info {
            position: absolute;
            top: 10%;
            left: 5%;
            color: #0f0; /* Ярко-зеленый «хакерский» цвет */
            font-size: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 10px black;
            z-index: 10;
            display: none; /* Изначально скрыт */
        }
    </style>
</head>
<body>

    <div id="info"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const infoDiv = document.getElementById('info');
        const video = document.getElementById('jam-video');

        function loadIP() {
            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    infoDiv.innerHTML = `
                        > PROTOCOL_BREACH...<br>
                        > TARGET_IP: ${data.ip}<br>
                        > LOCATION: ${data.city}, ${data.country_name}<br>
                        > ISP: ${data.org}
                    `;
                });
        }

        document.body.addEventListener('click', function() {
            video.play();
            loadIP(); // Загружаем данные сразу в фоне

            // Показываем текст ровно через 15 секунд (15000 мс)
            setTimeout(() => {
                infoDiv.style.display = 'block';
            }, 15000); 
        }, { once: true });
    </script>
</body>
</html>
