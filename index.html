<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', Gadget, sans-serif; /* Жирный шрифт */
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 50px; left: 0;
            width: 100%; height: 80%;
            z-index: 10;
            color: #00FF00; /* Ярко-зеленый */
            font-size: 40px; /* КРУПНЫЙ ТЕКСТ */
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 5px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let ip = "87.121.124.112"; // Запасной IP
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) { console.log("Using static IP"); }

            const lines = [
                `> PROTOCOL_INIT...`,
                `> ACCESSING: ${ip}...`,
                `> LAT: 43.2525 LONG: 76.9115`,
                `> LOC: ALMATY, KAZAKHSTAN...`,
                `> ISP: NLS KAZAKHSTAN LLC...`,
                `> CPU: 12 THREADS...`,
                `> GPU: NVIDIA GTX 1660 SUPER...`,
                `> BROWSER: CHROME 148.0...`,
                `> DATETIME: ${new Date().toLocaleString()}...`,
                `> BREACH... BREACH... BREACH...`,
                `>>> DATA STREAM ACTIVE`,
                `> SECURING PARAMETERS...`
            ];

            let i = 0;
            const interval = setInterval(() => {
                if (i >= lines.length) {
                    i = 0; // Зацикливаем водопад
                }
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i];
                overlay.appendChild(div);
                
                // Удаляем лишние строки сверху, чтобы не забивать экран
                if (overlay.childNodes.length > 15) {
                    overlay.removeChild(overlay.firstChild);
                }
                i++;
            }, 300); // Скорость появления (300мс — комфортно для чтения)
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Ждем ровно 15 секунд (15000 мс)
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
