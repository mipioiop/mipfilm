<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FUNNY VIDEO!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 40px; left: 0;
            width: 100%; height: 90%;
            z-index: 10;
            color: #00FF00;
            font-size: clamp(20px, 5vw, 45px); /* Текст подстроится под экран */
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 5px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 8px; width: 100%; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let lines = [];
            
            try {
                // Используем другой, более стабильный сервис
                const res = await fetch('https://demo.ip-api.com/json/?fields=66842623');
                const data = await res.json();
                
                lines = [
                    `> IP: ${data.query}`,
                    `> COUNTRY: ${data.country}`,
                    `> CITY: ${data.city}`,
                    `> ISP: ${data.isp}`,
                    `> LAT: ${data.lat} / LON: ${data.lon}`,
                    `> OS: ${navigator.platform}`,
                    `> CORES: ${navigator.hardwareConcurrency} THREADS`,
                    `> BROWSER: ${navigator.vendor}`,
                    `>>> DATA LEAK SUCCESSFUL`,
                    `> SYSTEM_BREACH_COMPLETE`,
                    `> LOCATING TARGET... FOUND`
                ];
            } catch (e) {
                // Если сервис упал, показываем системные данные (они всегда доступны)
                lines = [
                    `> IP: 127.0.0.1 (PROXY ACTIVE)`,
                    `> OS: ${navigator.platform}`,
                    `> BROWSER: ${navigator.userAgent.split(' ')[0]}`,
                    `> SCREEN: ${window.screen.width}x${window.screen.height}`,
                    `> CONNECTION_ERROR: RETRYING...`,
                    `> STATUS: TARGET_WATCHING_MINIONS`
                ];
            }

            let i = 0;
            const interval = setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                
                if (overlay.childNodes.length > 12) {
                    overlay.removeChild(overlay.firstChild);
                }
                i++;
            }, 250); // Чуть быстрее, чтобы выглядело динамичнее
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Ждем 15 секунд
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
