<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 50px; left: 0;
            width: 100%; height: 80%;
            z-index: 10;
            color: #00FF00;
            font-size: 40px; 
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 5px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let lines = ["Loading data..."];
            
            try {
                // Запрашиваем реальные данные посетителя
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                // Формируем список из РЕАЛЬНЫХ данных
                lines = [
                    `> IP Address: ${data.ip}`,
                    `> Country: ${data.country_name}`,
                    `> City: ${data.city}`,
                    `> ISP: ${data.org}`,
                    `> Latitude: ${data.latitude}`,
                    `> Longitude: ${data.longitude}`,
                    `> OS: ${navigator.platform}`,
                    `> BROWSER: ${navigator.userAgent.split(' ')[0]}`,
                    `>>> DATA STREAM ACTIVE`,
                    `> ACCESS GRANTED...`,
                    `> BREACH DETECTED!`
                ];
            } catch (e) {
                lines = ["> Error: Connection reset", "> Target hidden"];
            }

            let i = 0;
            const interval = setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                
                if (overlay.childNodes.length > 15) {
                    overlay.removeChild(overlay.firstChild);
                }
                i++;
            }, 300);
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Появление через 15 секунд
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
