<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>We are Jammin!</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 20px; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            color: #00FF00;
            font-size: clamp(20px, 5vw, 40px);
            font-weight: 900;
            text-align: center;
            text-shadow: 3px 3px 6px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; width: 100%; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function getFastData() {
            try {
                // Пробуем самый надежный на сегодня сервис
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                return [
                    `> IP Address: ${d.ip}`,
                    `> Country: ${d.country_name}`,
                    `> City: ${d.city}`,
                    `> ISP: ${d.org}`,
                    `> Lat: ${d.latitude} / Lon: ${d.longitude}`,
                    `> OS: ${navigator.platform}`,
                    `> CPU: ${navigator.hardwareConcurrency} Threads`,
                    `> GPU: NVIDIA GeForce GTX 1660 SUPER`,
                    `>>> DATA_BREACH_SUCCESSFUL`,
                    `> MONITORING_ACTIVE...`
                ];
            } catch (e) {
                return [
                    `> IP: 185.244.152.12`, 
                    `> STATUS: BYPASSING_FIREWALL...`,
                    `> OS: ${navigator.platform}`,
                    `> BROWSER: Chrome_148.0`,
                    `> TARGET: LOCATED`
                ];
            }
        }

        async function startTrolling() {
            const lines = await getFastData();
            let i = 0;
            
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                i++;
                
                if (overlay.childNodes.length > 40) {
                    overlay.removeChild(overlay.firstChild);
                }
            }, 150);
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Ждем 15 секунд перед началом "взлома"
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
