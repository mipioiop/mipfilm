<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Веселый</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: Arial, sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
        }
        /* Стиль для текста с IP */
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            z-index: 10; /* Чтобы текст был поверх видео */
        }
    </style>
</head>
<body>

    <div id="info">Загрузка данных...</div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

   <script>
    // Скрываем текст изначально (на всякий случай)
    const infoDiv = document.getElementById('info');
    infoDiv.style.display = 'none';

    // Функция для получения данных
    function showData() {
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                infoDiv.innerHTML = `
                    IP: ${data.ip}<br>
                    City: ${data.city}<br>
                    Provider: ${data.org}
                `;
                
                // А вот здесь магия задержки:
                // 3000 — это 3 секунды (время в миллисекундах)
                setTimeout(() => {
                    infoDiv.style.display = 'block';
                }, 15000); 
            })
            .catch(() => {
                console.log("Ошибка загрузки данных");
            });
    }

    // Запуск всего процесса по клику
    document.body.addEventListener('click', function() {
        document.getElementById('jam-video').play();
        showData(); // Запускаем поиск данных только после клика
    }, { once: true });
</script>
</body>
</html>
