<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SUPER PUPER VIDEO</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: black;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
        video {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 20px; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            color: #00FF00;
            font-size: 32px; 
            font-weight: 900;
            text-align: center;
            text-shadow: 2px 2px 5px #000;
            pointer-events: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .line { margin-bottom: 5px; width: 100%; }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <video id="jam-video" loop playsinline>
        <source src="jammin.mp4" type="video/mp4">
    </video>

    <script>
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('jam-video');

        async function startTrolling() {
            let realIP = "LOADING...";
            
            try {
                // Самый надежный способ получить ТОЛЬКО твой IP
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                realIP = data.ip;
            } catch (e) {
                realIP = "127.0.0.1 (HIDDEN)";
            }

            const lines = [
                `> PROTOCOL_INIT...`,
                `> TARGET_IP: ${realIP}`,
                `> ACCESS_LEVEL: ROOT`,
                `> DEVICE: ${navigator.platform}`,
                `> CORES: ${navigator.hardwareConcurrency || 'UNKNOWN'}`,
                `> BROWSER: ${navigator.vendor}`,
                `> RESOLUTION: ${window.screen.width}x${window.screen.height}`,
                `> STATUS: EXPOSED`,
                `> DATA_LEAK: SUCCESSFUL`,
                `-----------------------`
            ];

            let i = 0;
            // Текст копится и НЕ удаляется
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerText = lines[i % lines.length];
                overlay.appendChild(div);
                
                // Автоматически прокручиваем вниз, если строк слишком много
                window.scrollTo(0, document.body.scrollHeight);
                i++;
            }, 150); // Скорость водопада
        }

        document.body.addEventListener('click', function() {
            video.play();
            // Появление ровно через 15 секунд
            setTimeout(startTrolling, 15000);
        }, { once: true });
    </script>
</body>
</html>
